<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Riña</title>
    <link rel="icon" type="image/png" href="logo.png">
<style>
    canvas, body {
        margin: 0;
        overflow: hidden;
    }

    #mobile-controls {
        position: fixed;
        bottom: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
        z-index: 10;
        pointer-events: auto;
    }

    #mobile-controls button {
        font-size: 24px;
        padding: 10px 14px;
        cursor: pointer;
    }

    #actions {
        display: flex;
        gap: 10px;
    }

    @media (min-width: 768px) {
        #mobile-controls {
            display: none;
        }
    }
    button{
       border-radius: 30px;
       color:white;
       background-color: purple;
       font-family: Tahoma;
       font-weight: bold;
    }
</style>
</head>
<body>
    <div>
        <canvas id="c"></canvas>
<div id="mobile-controls">
    <button id="left">←</button>
    <button id="right">→</button>
<div id="actions">
        <button id="shield">🛡</button>
        <button id="punch">👊</button>
</div>
</div>
    </div>
<script type="module"src="main.js"></script>
</body>
</html>
